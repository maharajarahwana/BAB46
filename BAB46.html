  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bab46</title>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:500px;
  margin:auto;
  padding:25px 20px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#question{
  font-size:42px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:10px;
  border:2px solid orange;
  border-radius:6px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;
  background:#007BFF;
  color:white;
  border:none;
  border-radius:6px;
}

.result{
  font-size:20px;
  font-weight:bold;
}

.correct{
  color:green;
}

.wrong{
  color:red;
}

/* Perbaikan agar nomor tidak terpotong */

ol{
  text-align:left;
  max-height:65vh;
  overflow-y:auto;
  padding-left:30px;
  margin:0;
}

li{
  margin-bottom:8px;
  line-height:1.4;
}

</style>
</head>

<body>

<div class="card">

<h2 id="question"></h2>

<input type="text" id="answerInput" placeholder="Tulis jawaban di sini">

<button id="nextBtn">Selanjutnya</button>

</div>

<script>

let questions = [

{ soal: "사육관리", jawaban: "pengelolaan ternak" },
{ soal: "우방", jawaban: "kios / kandang" },
{ soal: "육류소비", jawaban: "konsumsi daging" },
{ soal: "톱밥", jawaban: "serbuk gergaji" },
{ soal: "사료", jawaban: "pakan" },
{ soal: "먹이", jawaban: "pakan" },
{ soal: "이동시키다", jawaban: "memindahkan" },
{ soal: "짚", jawaban: "jerami" },
{ soal: "건초", jawaban: "rumput kering" },
{ soal: "별일 없어요", jawaban: "tidak ada yang istimewa" },
{ soal: "바가지", jawaban: "gayung" },
{ soal: "꼽하다", jawaban: "memilih" },
{ soal: "급이기", jawaban: "pemberi pakan" },
{ soal: "찜닭", jawaban: "ayam kukus" },
{ soal: "사료조", jawaban: "tempat pakan" },
{ soal: "닭갈비", jawaban: "iga ayam" },
{ soal: "조사료", jawaban: "pakan ternak kasar" },
{ soal: "프라이드치킨", jawaban: "ayam goreng" },
{ soal: "배합사료", jawaban: "pakan majemuk" },
{ soal: "고급의 식재료", jawaban: "bahan makanan kualitas tinggi" },
{ soal: "급수기", jawaban: "pemberi air" },
{ soal: "인식되다", jawaban: "diakui" },
{ soal: "계량컵", jawaban: "gelas ukur" },
{ soal: "대명사", jawaban: "kata ganti" },
{ soal: "양우농가", jawaban: "peternakan domba" },
{ soal: "채식주의자", jawaban: "vegetarian" },
{ soal: "소농장", jawaban: "peternakan sapi" },
{ soal: "소축사", jawaban: "peternakan sapi" },
{ soal: "비건제품", jawaban: "produk vegan" },
{ soal: "돼지농장", jawaban: "peternakan babi" },
{ soal: "돼지축사", jawaban: "peternakan babi" },
{ soal: "돼지우리", jawaban: "peternakan babi" },
{ soal: "수요", jawaban: "permintaan" },
{ soal: "닭농장", jawaban: "peternakan ayam" },
{ soal: "양계장", jawaban: "peternakan ayam" },
{ soal: "순서", jawaban: "urutan" },
{ soal: "분뇨탱크", jawaban: "tangki penyimpan kotoran" },
{ soal: "유무", jawaban: "ada atau tidak ada" }

];

questions = questions.sort(()=>Math.random()-0.5);

let index = 0;
let score = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const answerInput = document.getElementById("answerInput");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

function showQuestion(){
  questionEl.textContent = questions[index].soal;
  answerInput.value="";
  answerInput.focus();
}

nextBtn.addEventListener("click",()=>{

  const userAnswer = answerInput.value.trim().toLowerCase();

  userAnswers[index] = userAnswer;

  if(userAnswer === questions[index].jawaban){
    score++;
  }

  index++;

  if(index < questions.length){
    showQuestion();
  }else{
    showResult();
  }

});

function showResult(){

  let answerList="";

  questions.forEach((q,i)=>{

    if(userAnswers[i] === q.jawaban){
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span></li>`;
    }else{
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span><br>
      Jawaban kamu: <span class="wrong">${userAnswers[i] || "(kosong)"}</span></li>`;
    }

  });

  card.innerHTML = `
  <hr>
  <p>Kunci Jawaban:</p>
  <ol>${answerList}</ol>
  `;

}

showQuestion();

</script>

</body>
</html>
